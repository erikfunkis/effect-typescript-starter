name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1

      - name: Install
        run: vp install

      - name: Check
        run: vp run check

      - name: Test
        run: vp run test

      - name: API smoke
        run: |
          set -euo pipefail
          API_PORT=3737 node --import tsx apps/api/src/server.ts &
          API_PID=$!
          cleanup() {
            kill "$API_PID" 2>/dev/null || true
            pkill -f "apps/api/src/server.ts" 2>/dev/null || true
          }
          trap cleanup EXIT
          sleep 3
          API_PORT=3737 vp run --filter @template/api smoke

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E (Chromium)
        run: vp run test:e2e
